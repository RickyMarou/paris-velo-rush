<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Roadside Sprite Sandbox</title>
  <style>
    * { margin: 0; padding: 0; }
    body { background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; }
    canvas { max-width: 100vw; max-height: 100vh; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>

  <script src="js/constants.js"></script>
  <script src="js/util.js"></script>
  <script src="js/road.js"></script>
  <script src="js/placeholder.js"></script>
  <script src="js/loader.js"></script>
  <script src="js/render.js"></script>
  <script src="js/npc.js"></script>

  <script>
  window.addEventListener('DOMContentLoaded', function() {
    var canvas = document.getElementById('game');
    canvas.width = PVR.WIDTH;
    canvas.height = PVR.HEIGHT;

    PVR.Render.init(canvas.getContext('2d'));

    PVR.Loader.load(function() {
      PVR.Road.buildTrack();

      PVR.Render.staticScene(
        PVR.Road.segments,
        0,
        PVR.ROAD.CAMERA_HEIGHT,
        -2 * PVR.ROAD.SEGMENT_LENGTH
      );
    });
  });
  </script>
</body>
</html>
